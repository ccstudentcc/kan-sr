task:
  name: multivariate_sinexp_notebook_strict
  description: Strict notebook reproduction for multivariate sin-exp symbolic regression

reproducibility:
  # Notebook create_dataset default seed is 0
  seed_list: [0]

experiment:
  n_repeats: 1

data:
  generator: sin_exp
  n_var: 2
  ranges: [-4, 4]
  train_num: 30000
  test_num: 5000
  # Notebook: create_dataset(... normalize_input=True, normalize_label=True)
  normalize_input: true
  normalize_label: true
  noise:
    enabled: false
    kind: gaussian
    std: 0.05

split:
  use_generator_split: true

budget:
  # Keep per-method caps aligned with notebook settings.
  # Global time budget is retained only as an audit field in plan.
  time_budget_seconds: 900
  per_method:
    kan:
      fit_steps_cap: 50
    gplearn:
      generations_cap: 5
    bms:
      epochs_cap: 50
    qlattice:
      n_models_cap: 1

methods:
  kan:
    params:
      width: [2, 2, 1]
      grid: 4
      k: 3
      fit_stages:
        - opt: LBFGS
          batch: -1
          steps: 50
          lamb: 0.001
          lamb_entropy: 4.0
      symbolic:
        enable_auto_symbolic: false

  gplearn:
    params:
      function_set: [add, mul, sin, exp]
      population_size: 20000
      generations: 5
      init_depth: [4, 10]
      metric: mse
      n_jobs: -1
      verbose: 1
      random_state_from_run_seed: true

  bms:
    params:
      epochs: 50
      # Align to tuned notebook best params (6-value ts)
      ts: [1.0, 1.01, 1.0201, 1.030301, 1.04060401, 1.0510100501]

  qlattice:
    params:
      target: y
      features: [x1, x2]
      n_epochs: 20
      # Notebook used ql = feyn.QLattice() without explicit seed.
      random_seed_from_run_seed: false
      # Notebook used qlattice_models[0]
      n_models_to_eval: 1
